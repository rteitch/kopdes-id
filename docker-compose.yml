version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: kopdes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kopdes_password_2026
      POSTGRES_DB: kopdes_id
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kopdes-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:kopdes_password_2026@db:5432/kopdes_id"
      DIRECT_URL: "postgresql://postgres:kopdes_password_2026@db:5432/kopdes_id"
      NEXTAUTH_SECRET: "kopdes-id-secret-change-in-production-2026"
      NEXTAUTH_URL: "http://localhost:3000"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: